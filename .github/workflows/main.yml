name: Deploy Frontend Backoffice

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment'
        required: false
        default: 'true'

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: fature-frontend-backoffice
  EKS_CLUSTER_NAME: fature-cluster
  NAMESPACE: fature
  DEPLOYMENT_NAME: frontend-backoffice

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linter
      run: npm run lint
      
    - name: Build application
      run: npm run build

  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Verify build output
      run: |
        ls -la dist/
        echo "Build completed successfully"
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build da imagem Docker
        echo "🔨 Building Docker image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Push das imagens para ECR
        echo "📤 Pushing images to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Output da imagem para uso em steps subsequentes
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
        
        echo "✅ Image successfully built and pushed to ECR!"
        echo "📋 Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "📋 Latest: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        
    - name: Verify ECR images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🔍 Verifying images in ECR..."
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=$IMAGE_TAG
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=latest
        echo "✅ Images verified in ECR!"
        
    - name: Trigger deployment webhook
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 Triggering deployment via webhook..."
        
        # Criar payload para webhook
        PAYLOAD=$(cat << EOF
        {
          "repository": "$ECR_REPOSITORY",
          "image_tag": "$IMAGE_TAG",
          "image_uri": "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG",
          "cluster": "$EKS_CLUSTER_NAME",
          "namespace": "$NAMESPACE",
          "deployment": "$DEPLOYMENT_NAME",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
        )
        
        echo "📦 Deployment payload prepared:"
        echo "$PAYLOAD"
        
        # Simular webhook call (placeholder para implementação futura)
        echo "⚠️ Webhook deployment não implementado ainda"
        echo "💡 Para deployment manual, execute:"
        echo "kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n $NAMESPACE"
        
    - name: Deploy summary
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🎉 BUILD AND PUSH COMPLETED SUCCESSFULLY!"
        echo ""
        echo "📦 Built and pushed Docker images:"
        echo "   • $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "   • $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        echo ""
        echo "🚀 Next steps:"
        echo "   1. Image is ready in ECR"
        echo "   2. Deployment can be updated manually or via automation"
        echo ""
        echo "🌐 Expected Load Balancer URL:"
        echo "   http://adb6c471809c54b0992ab68ce696da11-314674034.sa-east-1.elb.amazonaws.com/"
        echo ""
        echo "💡 Manual deployment command:"
        echo "   kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n $NAMESPACE"

