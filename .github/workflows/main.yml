name: Deploy Frontend Backoffice

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment'
        required: false
        default: 'true'

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: fature-frontend-backoffice
  EKS_CLUSTER_NAME: fature-cluster
  NAMESPACE: fature
  DEPLOYMENT_NAME: frontend-backoffice

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linter
      run: npm run lint
      
    - name: Build application
      run: npm run build

  deploy:
    name: Deploy to ECR and EKS
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Verify build output
      run: |
        ls -la dist/
        echo "Build completed successfully"
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build da imagem Docker
        echo "🔨 Building Docker image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Push das imagens para ECR
        echo "📤 Pushing images to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Output da imagem para uso em steps subsequentes
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
        
        echo "✅ Image successfully built and pushed to ECR!"
        echo "📋 Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "📋 Latest: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
        
    - name: Create Kubernetes Service Account and RBAC
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🔧 Setting up Kubernetes Service Account and RBAC..."
        
        # Create service account
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: github-actions-sa
          namespace: $NAMESPACE
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          namespace: $NAMESPACE
          name: deployment-manager
        rules:
        - apiGroups: ["apps"]
          resources: ["deployments"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "watch"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: github-actions-binding
          namespace: $NAMESPACE
        subjects:
        - kind: ServiceAccount
          name: github-actions-sa
          namespace: $NAMESPACE
        roleRef:
          kind: Role
          name: deployment-manager
          apiGroup: rbac.authorization.k8s.io
        EOF
        
        echo "✅ Service Account and RBAC configured!"
        
    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 Deploying to EKS..."
        
        # Check if deployment exists
        if kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE >/dev/null 2>&1; then
          echo "📝 Updating existing deployment..."
          kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n $NAMESPACE
        else
          echo "🆕 Creating new deployment..."
          kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $DEPLOYMENT_NAME
          namespace: $NAMESPACE
          labels:
            app: $DEPLOYMENT_NAME
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: $DEPLOYMENT_NAME
          template:
            metadata:
              labels:
                app: $DEPLOYMENT_NAME
            spec:
              containers:
              - name: $DEPLOYMENT_NAME
                image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                ports:
                - containerPort: 80
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
                    cpu: "200m"
                livenessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 10
                readinessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 5
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $DEPLOYMENT_NAME-service
          namespace: $NAMESPACE
        spec:
          selector:
            app: $DEPLOYMENT_NAME
          ports:
            - protocol: TCP
              port: 80
              targetPort: 80
          type: ClusterIP
        EOF
        fi
        
        echo "⏳ Waiting for rollout to complete..."
        kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=300s
        
        echo "✅ Deployment completed successfully!"
        
    - name: Verify deployment
      run: |
        echo "🔍 Verifying deployment..."
        kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE
        kubectl get pods -l app=$DEPLOYMENT_NAME -n $NAMESPACE
        kubectl get service $DEPLOYMENT_NAME-service -n $NAMESPACE
        
        echo "📊 Deployment status:"
        kubectl describe deployment $DEPLOYMENT_NAME -n $NAMESPACE
        
    - name: Verify ECR images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🔍 Verifying images in ECR..."
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=$IMAGE_TAG
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=latest
        echo "✅ Images verified in ECR!"
        
    - name: Deploy summary
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🎉 DEPLOY COMPLETED SUCCESSFULLY!"
        echo ""
        echo "📦 Built and pushed Docker images:"
        echo "   • $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "   • $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        echo ""
        echo "🚀 Deployed to EKS:"
        echo "   • Cluster: $EKS_CLUSTER_NAME"
        echo "   • Namespace: $NAMESPACE"
        echo "   • Deployment: $DEPLOYMENT_NAME"
        echo ""
        echo "🌐 Access via Load Balancer:"
        echo "   http://adb6c471809c54b0992ab68ce696da11-314674034.sa-east-1.elb.amazonaws.com/"

