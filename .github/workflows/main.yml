name: Deploy Frontend Backoffice - Reliable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment'
        required: false
        default: 'true'

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: fature-frontend-backoffice
  EKS_CLUSTER_NAME: fature-cluster
  NAMESPACE: fature
  DEPLOYMENT_NAME: frontend-backoffice

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linter
      run: npm run lint
      
    - name: Build application
      run: npm run build

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    
    outputs:
      image-uri: ${{ steps.build-image.outputs.image }}
      image-tag: ${{ github.sha }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Verify build output
      run: |
        ls -la dist/
        echo "тЬЕ Build completed successfully"
        echo "ЁЯУж Build artifacts ready for containerization"
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "ЁЯФи Building Docker image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        echo "ЁЯУд Pushing images to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
        
        echo "тЬЕ Images successfully pushed to ECR!"
        echo "ЁЯУЛ Tagged image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "ЁЯУЛ Latest image: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        
    - name: Verify ECR images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "ЁЯФН Verifying images in ECR..."
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=$IMAGE_TAG
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=latest
        echo "тЬЕ Images verified in ECR!"

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        
    - name: Configure kubectl for EKS
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
        
    - name: Verify cluster connection
      run: |
        kubectl get nodes
        kubectl get namespaces
        
    - name: Deploy to EKS
      env:
        IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
      run: |
        echo "ЁЯЪА Deploying to EKS cluster..."
        echo "ЁЯУж Image: $IMAGE_URI"
        
        # Update the deployment with new image
        kubectl set image deployment/$DEPLOYMENT_NAME \
          $DEPLOYMENT_NAME=$IMAGE_URI \
          -n $NAMESPACE
          
        echo "тП│ Waiting for deployment to complete..."
        kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=300s
        
        echo "тЬЕ Deployment completed successfully!"
        
    - name: Verify deployment
      run: |
        echo "ЁЯФН Verifying deployment status..."
        kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE
        kubectl get pods -n $NAMESPACE -l app=$DEPLOYMENT_NAME
        kubectl get services -n $NAMESPACE
        
        echo "ЁЯУК Deployment verification complete!"

  deployment-ready:
    name: Deployment Ready Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-eks]
    if: success()
    
    steps:
    - name: Deployment Success Notification
      env:
        IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
      run: |
        echo "ЁЯОЙ DEPLOYMENT COMPLETED SUCCESSFULLY!"
        echo ""
        echo "ЁЯУж Deployed Image:"
        echo "   тАв URI: $IMAGE_URI"
        echo "   тАв Tag: $IMAGE_TAG"
        echo ""
        echo "ЁЯМР Frontend is now live at:"
        echo "   http://adb6c471809c54b0992ab68ce696da11-314674034.sa-east-1.elb.amazonaws.com/"
        echo ""
        echo "тЬЕ Pipeline Status: FULLY AUTOMATED"
        echo "ЁЯУК Success Rate: Build тЬЕ | Push тЬЕ | Deploy тЬЕ"
        
    - name: Success notification
      run: |
        echo "::notice title=Deployment Complete::Image ${{ needs.build-and-push.outputs.image-tag }} successfully deployed to EKS cluster"
        echo "::notice title=Frontend URL::http://adb6c471809c54b0992ab68ce696da11-314674034.sa-east-1.elb.amazonaws.com/"

