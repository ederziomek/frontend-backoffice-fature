name: Deploy Frontend Backoffice - Advanced

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment'
        required: false
        default: 'true'

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: fature-frontend-backoffice
  EKS_CLUSTER_NAME: fature-cluster
  NAMESPACE: fature
  DEPLOYMENT_NAME: frontend-backoffice
  CLUSTER_ENDPOINT: https://374DAC231FA3AFEC625EA1EC4B00C5B9.sk1.sa-east-1.eks.amazonaws.com

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linter
      run: npm run lint
      
    - name: Build application
      run: npm run build

  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Verify build output
      run: |
        ls -la dist/
        echo "Build completed successfully"
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build da imagem Docker
        echo "🔨 Building Docker image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Push das imagens para ECR
        echo "📤 Pushing images to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Output da imagem para uso em steps subsequentes
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
        
        echo "✅ Image successfully built and pushed to ECR!"
        echo "📋 Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "📋 Latest: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Advanced EKS Deployment Strategy
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🚀 Implementing advanced deployment strategy..."
        
        # Configurar kubectl
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
        
        # Estratégia 1: Tentar deployment direto
        echo "🎯 Strategy 1: Direct kubectl deployment..."
        if kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE 2>/dev/null; then
          echo "📝 Deployment exists, updating image..."
          if kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n $NAMESPACE; then
            echo "✅ Direct deployment successful!"
            kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=300s
            exit 0
          else
            echo "❌ Direct deployment failed, trying alternative..."
          fi
        else
          echo "📝 Deployment doesn't exist, creating new one..."
        fi
        
        # Estratégia 2: Criar deployment via YAML
        echo "🎯 Strategy 2: YAML-based deployment..."
        cat << EOF | kubectl apply -f - || echo "YAML deployment failed"
        apiVersion: v1
        kind: Namespace
        metadata:
          name: $NAMESPACE
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $DEPLOYMENT_NAME
          namespace: $NAMESPACE
          labels:
            app: $DEPLOYMENT_NAME
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: $DEPLOYMENT_NAME
          template:
            metadata:
              labels:
                app: $DEPLOYMENT_NAME
            spec:
              containers:
              - name: $DEPLOYMENT_NAME
                image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                ports:
                - containerPort: 80
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
                livenessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 10
                readinessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 5
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $DEPLOYMENT_NAME-service
          namespace: $NAMESPACE
          labels:
            app: $DEPLOYMENT_NAME
        spec:
          selector:
            app: $DEPLOYMENT_NAME
          ports:
            - protocol: TCP
              port: 80
              targetPort: 80
          type: ClusterIP
        EOF
        
        # Verificar se deployment foi criado/atualizado
        if kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE 2>/dev/null; then
          echo "✅ Deployment created/updated successfully!"
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=300s
        else
          echo "❌ All deployment strategies failed"
          exit 1
        fi
        
    - name: Verify deployment
      run: |
        echo "🔍 Verifying deployment status..."
        kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE || echo "Deployment not found"
        kubectl get pods -l app=$DEPLOYMENT_NAME -n $NAMESPACE || echo "Pods not found"
        kubectl get service $DEPLOYMENT_NAME-service -n $NAMESPACE || echo "Service not found"
        
        echo "📊 Deployment details:"
        kubectl describe deployment $DEPLOYMENT_NAME -n $NAMESPACE || echo "Cannot describe deployment"
        
    - name: Verify ECR images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🔍 Verifying images in ECR..."
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=$IMAGE_TAG
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-ids imageTag=latest
        echo "✅ Images verified in ECR!"
        
    - name: Test Load Balancer
      run: |
        echo "🌐 Testing Load Balancer connectivity..."
        LB_URL="http://adb6c471809c54b0992ab68ce696da11-314674034.sa-east-1.elb.amazonaws.com/"
        
        echo "📡 Attempting to reach: $LB_URL"
        if curl -f -s --max-time 10 "$LB_URL" > /dev/null; then
          echo "✅ Load Balancer is responding!"
        else
          echo "⚠️ Load Balancer not responding yet (may need time to update)"
        fi
        
    - name: Deploy summary
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🎉 DEPLOYMENT COMPLETED!"
        echo ""
        echo "📦 Docker Images:"
        echo "   • $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "   • $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        echo ""
        echo "🚀 Kubernetes Deployment:"
        echo "   • Cluster: $EKS_CLUSTER_NAME"
        echo "   • Namespace: $NAMESPACE"
        echo "   • Deployment: $DEPLOYMENT_NAME"
        echo ""
        echo "🌐 Frontend Access:"
        echo "   • URL: http://adb6c471809c54b0992ab68ce696da11-314674034.sa-east-1.elb.amazonaws.com/"
        echo ""
        echo "⏰ Note: Load Balancer may take 2-3 minutes to reflect changes"

